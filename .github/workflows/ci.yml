name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint Python sources
        run: python -m ruff check .

      - name: Check governance-source formatting
        run: >-
          python -m ruff format --check
          scripts/repo_status.py
          tt_rqm_kernels/su2_benchmark.py
          tests/test_repo_status.py

      - name: Run Python tests
        run: python -m pytest

      - name: Run StructuredBench smoke
        run: python -m tt_rqm_kernels.structuredbench --suite smoke --items 128 --iters 1 --warmup 0

      - name: Validate qmul release evidence
        run: |
          python scripts/validate_benchmark_release.py
          python scripts/reproduce_wormhole_qmul.py --check

      - name: Validate SU2ComposeBench evidence
        run: |
          python scripts/validate_su2_compose_preregistration.py
          python scripts/validate_su2_compose_release.py
          python scripts/reproduce_wormhole_su2_compose.py --check

      - name: Validate repository status
        run: python scripts/repo_status.py

      - name: Verify deterministic generated outputs
        run: |
          python scripts/generate_qmul_hardware_evidence.py
          python scripts/generate_benchmark_plots.py
          python scripts/generate_su2_compose_plots.py
          git diff --exit-code

      - name: Check patch formatting
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" HEAD
          else
            git diff --check HEAD^ HEAD
          fi

      - name: Require a clean worktree
        run: test -z "$(git status --short)"
