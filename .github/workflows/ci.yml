name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint Python sources
        run: python -m ruff check .

      - name: Check governance-source formatting
        run: >-
          python -m ruff format --check
          scripts/repo_status.py
          scripts/generate_hamiltonian_lowering_release.py
          scripts/reproduce_wormhole_hamiltonian_lowering.py
          scripts/validate_hamiltonian_lowering_release.py
          scripts/validate_repository_claims.py
          tt_rqm_kernels/entanglement_benchmark.py
          tt_rqm_kernels/hamiltonian_lowering_benchmark.py
          tt_rqm_kernels/hamiltonian_lowering_candidate.py
          tt_rqm_kernels/hamiltonian_lowering_designated.py
          tt_rqm_kernels/hamiltonian_lowering_evidence.py
          tt_rqm_kernels/hamiltonian_lowering_pilot.py
          tt_rqm_kernels/hamiltonian_lowering_preregistration.py
          tt_rqm_kernels/hamiltonian_lowering_release.py
          tt_rqm_kernels/hamiltonian_lowering_source_identity.py
          tt_rqm_kernels/repository_claims.py
          tt_rqm_kernels/su2_benchmark.py
          tt_rqm_kernels/su2_candidate_experiment.py
          tt_rqm_kernels/su2_hardware_session.py
          tt_rqm_kernels/su2_profile.py
          tt_rqm_kernels/su2_stability.py
          tests/test_entanglement_benchmark.py
          tests/test_hamiltonian_lowering_benchmark.py
          tests/test_hamiltonian_lowering_candidate.py
          tests/test_hamiltonian_lowering_designated.py
          tests/test_hamiltonian_lowering_evidence.py
          tests/test_hamiltonian_lowering_pilot.py
          tests/test_hamiltonian_lowering_release.py
          tests/test_hamiltonian_lowering_source_identity.py
          tests/test_repository_claims.py
          tests/test_tt_metalium_h2a_scaffold.py
          tests/test_repo_status.py
          tests/test_su2_candidate_experiment.py
          tests/test_su2_hardware_session.py
          tests/test_su2_profile.py
          tests/test_su2_stability.py

      - name: Run Python tests
        run: python -m pytest

      - name: Run StructuredBench smoke
        run: python -m tt_rqm_kernels.structuredbench --suite smoke --items 128 --iters 1 --warmup 0

      - name: Validate qmul release evidence
        run: |
          python scripts/validate_benchmark_release.py
          python scripts/reproduce_wormhole_qmul.py --check

      - name: Validate SU2ComposeBench evidence
        run: |
          python scripts/validate_su2_compose_preregistration.py
          python scripts/validate_su2_candidate_experiment.py
          python scripts/validate_su2_compose_profile.py
          python scripts/validate_su2_compose_stability_preregistration.py
          python scripts/validate_su2_compose_stability_preregistration.py --manifest benchmarks/manifests/su2-compose-stability-preregistration-v2.json
          python scripts/qualify_su2_compose_stability.py \
            benchmarks/raw/su2-compose/2026-07-15-n300-device0-su2-v2-session-1/session-manifest.json \
            benchmarks/raw/su2-compose/2026-07-15-n300-device0-su2-v2-session-2/session-manifest.json \
            benchmarks/raw/su2-compose/2026-07-15-n300-device0-su2-v2-session-3/session-manifest.json \
            --preregistration benchmarks/manifests/su2-compose-stability-preregistration-v2.json \
            --expected-outcome failed \
            --output /tmp/wormhole-su2-compose-stability-qualification.json
          cmp /tmp/wormhole-su2-compose-stability-qualification.json benchmarks/processed/wormhole-su2-compose-stability-qualification.json
          python scripts/validate_su2_compose_release.py
          python scripts/reproduce_wormhole_su2_compose.py --check

      - name: Validate EntanglementDynamicsBench foundation
        run: python scripts/validate_entanglement_dynamics_preregistration.py

      - name: Validate H2A foundation
        run: |
          python scripts/validate_hamiltonian_lowering_preregistration.py
          python scripts/validate_hamiltonian_lowering_evidence.py
          python scripts/validate_hamiltonian_lowering_clean_reproduction.py
          python scripts/validate_hamiltonian_lowering_designated_contract.py
          python scripts/qualify_hamiltonian_lowering_h2a_designated.py --contract-only
          python scripts/validate_hamiltonian_lowering_release.py
          python scripts/reproduce_wormhole_hamiltonian_lowering.py --check
          python scripts/validate_hamiltonian_lowering_candidate.py \
            --command "python scripts/hamiltonian_lowering_external_reference.py"
          for manifest in benchmarks/pilots/hamiltonian-lowering-h2a/*/pilot-manifest.json; do
            if [ -f "$manifest" ]; then
              python scripts/validate_hamiltonian_lowering_pilot.py "$(dirname "$manifest")"
            fi
          done

      - name: Validate repository status
        run: |
          python scripts/validate_repository_claims.py
          python scripts/repo_status.py

      - name: Verify deterministic generated outputs
        run: |
          python scripts/generate_qmul_hardware_evidence.py
          python scripts/generate_benchmark_plots.py
          python scripts/generate_su2_compose_plots.py
          git diff --exit-code

      - name: Check patch formatting
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" HEAD
          else
            git diff --check HEAD^ HEAD
          fi

      - name: Require a clean worktree
        run: test -z "$(git status --short)"
